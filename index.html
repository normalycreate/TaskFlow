<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="icon/TaskFlow.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>TaskFlow</title>
</head>
<body>
    <!--Navbar-->
    <div class="navbar">
        <h1 class="logo">Task<span class="flowColor">Flow</span></h1>
        <ul class="navbarFeature">
            <li class="pallete"><button class="palleteButton"><svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
            fill="currentColor" viewBox="0 0 24 24" > <path d="m17.32 2.87-2.36 2.37L13.73 4c-.38-.38-.88-.58-1.41-.58-.54 0-1.04.21-1.42.59L8.96 5.96 2.3 12.61c-.19.19-.29.44-.29.71s.11.52.29.71l7.69 7.69c.2.2.45.29.71.29s.51-.1.71-.29l6.66-6.65 1.94-1.95c.78-.78.78-2.05 0-2.83l-1.23-1.23 2.44-2.44c.51-.51.79-1.19.79-1.91 0-.8-.36-1.56-.98-2.08-1.06-.88-2.68-.78-3.7.24Zm-6.63 16.72-6.28-6.28 5.25-5.24 3.14 3.14 3.14 3.14-5.24 5.24Zm9.1-14.39-3.14 3.15a.996.996 0 0 0 0 1.41l1.93 1.93-1.24 1.24-3.14-3.14-3.14-3.14 1.24-1.24 1.94 1.94c.19.19.44.29.71.29s.52-.11.71-.29l3.07-3.08c.29-.29.74-.34 1-.12a.687.687 0 0 1 .05 1.03Z"></path>
            </svg></button></li>
            <li class="add"><button class="navButton"><svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
            fill="currentColor" viewBox="0 0 24 24" > <path d="M4 11h11v2H4zm0-5h16v2H4zm0 10h8v2H4zm15-3h-2v3h-3v2h3v3h2v-3h3v-2h-3z"></path>
            </svg></button></li>
            <li class="remove"><button class="navButton"><svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
            fill="currentColor" viewBox="0 0 24 24" > <path d="M4 11h16v2H4zm0-5h16v2H4zm0 10h8v2H4zm10 0h8v2h-8z"></path>
            </svg></button></li>
            <li class="removeAll"><button class="navButton"><svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
            fill="currentColor" viewBox="0 0 24 24" > <path d="M4 11h8v2H4zm0-5h16v2H4zm0 10h8v2H4zm16.29-2.71L18 15.59l-2.29-2.3-1.42 1.42 2.3 2.29-2.3 2.29 1.42 1.42 2.29-2.3 2.29 2.3 1.42-1.42-2.3-2.29 2.3-2.29z"></path>
            </svg></button></li>
        </ul>
    </div>
    <!--Written Bar-->
    <div class="writeBar">
        <div class="statusSelector">
            <div class="norStarted"></div>
            <div class="progress"></div>
            <div class="done"></div>
        </div>
        <input class="writtenBar" type="text">
    </div>
    <!--Schedule bar to indicate to project status-->
    <div class="taskBar">
        <div class="notStarted">
            <div class="scheduleNotStarted"></div>
        </div>
        <div class="progress">
            <div class="scheduleProgress"></div>
        </div>
        <div class="done">
            <div class="scheduleDone"></div>
        </div>
    </div>
</body>
</html>
