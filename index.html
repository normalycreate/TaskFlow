<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="icon/TaskFlow.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>TaskFlow</title>
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <h1 class="logo">
            Task<span class="flowColor">Flow</span>
        </h1>
        <ul class="navbarFeature">
            <li class="pallete" id="changeTheme">
            <button type="button" class="palleteButton">
                <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="currentColor"
                viewBox="0 0 24 24"
                >
                <title>Change Theme</title>
                <path
                    d="m17.32 2.87-2.36 2.37L13.73 4c-.38-.38-.88-.58-1.41-.58-.54 0-1.04.21-1.42.59L8.96 5.96 2.3 12.61c-.19.19-.29.44-.29.71s.11.52.29.71l7.69 7.69c.2.2.45.29.71.29s.51-.1.71-.29l6.66-6.65 1.94-1.95c.78-.78.78-2.05 0-2.83l-1.23-1.23 2.44-2.44c.51-.51.79-1.19.79-1.91 0-.8-.36-1.56-.98-2.08-1.06-.88-2.68-.78-3.7.24Zm-6.63 16.72-6.28-6.28 5.25-5.24 3.14 3.14 3.14 3.14-5.24 5.24Zm9.1-14.39-3.14 3.15a.996.996 0 0 0 0 1.41l1.93 1.93-1.24 1.24-3.14-3.14-3.14-3.14 1.24-1.24 1.94 1.94c.19.19.44.29.71.29s.52-.11.71-.29l3.07-3.08c.29-.29.74-.34 1-.12a.687.687 0 0 1 .05 1.03Z"
                ></path>
                </svg>
            </button>
            </li>
            <li class="sort" id="sortTask">
            <button type="button" class="navButton">
                <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="currentColor"
                viewBox="0 0 24 24"
                >
                <title>Sort Task</title>
                <path d="M12 16H8V2H6v14H2l5 6zm0-8h4v14h2V8h4l-5-6z"></path>
                </svg>
            </button>
            </li>
            <li class="add" id="addTask">
            <button type="button" class="navButton">
                <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="currentColor"
                viewBox="0 0 24 24"
                >
                <title>Add Task</title>
                <path d="M4 11h11v2H4zm0-5h16v2H4zm0 10h8v2H4zm15-3h-2v3h-3v2h3v3h2v-3h3v-2h-3z"></path>
                </svg>
            </button>
            </li>
            <li class="remove" id="removeTask">
            <button type="button" class="navButton">
                <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="currentColor"
                viewBox="0 0 24 24"
                >
                <title>Remove Task</title>
                <path d="M17 6V4c0-1.1-.9-2-2-2H9c-1.1 0-2 .9-2 2v2H2v2h2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8h2V6zM9 4h6v2H9zM6 20V8h12v12z"></path>
                <path d="M9 10h2v8H9zm4 0h2v8h-2z"></path>
                </svg>
            </button>
            </li>
        </ul>
    </div>

    <!-- Hamburger Navbar -->
    <div class="hamburgerNavbar">
    <li class="hamburger" id="hamburger">
        <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        fill="currentColor"
        viewBox="0 0 24 24"
        >
        <title>Hamburger Navbar</title>
        <path d="M3 5h18v2H3zm0 6h18v2H3zm0 6h18v2H3z"></path>
        </svg>
    </li>
    </div>
    <!--Written Bar-->
    <div class="writeBar">
        <p class="selectTheStatus">Select the status</p>
        <div class="statusSelector">
            <div class="notStarted">
                <input type="radio" class="radioNotStarted" id="radioNotStarted" name="status" value="notStarted" checked>
                <label for="radioNotStarted"><span class="notStartedColor"></span>Not Started</label>
            </div>
            <div class="progress">        
                <input type="radio" class="radioProgress" id="radioProgress" name="status" value="Progress" checked>
                <label for="radioProgress"><span class="progressColor"></span>Progress</label>
            </div>
            <div  class="done">
                <input type="radio" class="radioDone" id="radioDone" name="status" value="Done" checked>
                <label for="radioDone"><span class="doneColor"></span>Done</label>
            </div>
        </div>
        <input class="writtenBar" type="text">
    </div>
    <!--Schedule bar to indicate to project status-->
    <div class="mainBoard">
        <div class="board">
            <div class="boardColumm" id="boardNotStarted">
                <div class="statusBoard">
                    <span class="statusIcon notStartedColor"></span>
                    <span>Not Started</span>
                </div>
            </div>
            <div class="taskList">
                <!-- For add card generated display -->
                <div class="taskListCard">
                    <div class="nameCard"><span>Buah manggis buah mangga</span></div>
                    <div class="dateCreated"><span>25/06/2077</span></div>
                    <div class="taskCardMenu">
                        <button type="button" class="cardButton">A</button>
                        <button type="button" class="cardButton">B</button>
                    </div>
                </div>
                <!--Task Generate Here-->
                <div class="noTask"></div>
            </div>
        </div>
        <!--Schedule bar to indicate to project status-->
        <div class="board">
            <div class="boardColumm" id="boardProgress">
                <div class="statusBoard">
                    <span class="statusIcon progressColor"></span>
                    <span>Progress</span>
                </div>
            </div>
            <div class="taskList">
                <!--Task Generate Here-->
                <div class="noTask"></div>
            </div>
        </div>
        <!--Schedule bar to indicate to project status-->
        <div class="board">
            <div class="boardColumm" id="boardDone">
                <div class="statusBoard">
                    <span class="statusIcon doneColor"></span>
                    <span>Done</span>
                </div>
            </div>
            <div class="taskList">
                <!--Task Generate Here-->
                <div class="noTask"></div>
            </div>
        </div>
    </div>
</body>
</html>
